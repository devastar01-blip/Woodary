<style>
/* ═══ RESET ═══ */
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;font-family:'Segoe UI',system-ui,sans-serif;overflow-x:hidden}

/* ═══ THEME VARS ═══ */
:root,[data-theme="dark"]{
  --bg-page:   #0a0a0a;
  --bg-card:   rgba(14,14,16,0.82);
  --bg-card2:  rgba(10,10,12,0.86);
  --bg-input:  rgba(255,255,255,0.06);
  --bg-hover:  rgba(255,255,255,0.07);
  --border:    rgba(180,180,180,0.13);
  --border-f:  rgba(200,200,200,0.32);
  --text:      #ececec;
  --text-sub:  #9a9a9a;
  --text-muted:#5a5a5a;
  --accent:    #c8c8c8;
  --accent2:   #888;
  --overlay:   linear-gradient(160deg,rgba(6,6,8,0.72) 0%,rgba(10,10,12,0.60) 50%,rgba(6,6,8,0.75) 100%);
  --shadow:    0 8px 32px rgba(0,0,0,0.6);
  --scroll-bg: #111;
  --scroll-th: #333;
}
[data-theme="light"]{
  --bg-page:   #e8e8e8;
  --bg-card:   rgba(255,255,255,0.82);
  --bg-card2:  rgba(250,250,250,0.88);
  --bg-input:  rgba(0,0,0,0.04);
  --bg-hover:  rgba(0,0,0,0.04);
  --border:    rgba(0,0,0,0.12);
  --border-f:  rgba(0,0,0,0.30);
  --text:      #1a1a1a;
  --text-sub:  #555;
  --text-muted:#aaa;
  --accent:    #444;
  --accent2:   #888;
  --overlay:   linear-gradient(160deg,rgba(8,8,8,0.55) 0%,rgba(14,14,14,0.45) 50%,rgba(8,8,8,0.58) 100%);
  --shadow:    0 4px 24px rgba(0,0,0,0.14);
  --scroll-bg: #ddd;
  --scroll-th: #aaa;
}

/* ═══ BG WITH FURNITURE PHOTO ═══ */
body{background-color:var(--bg-page);color:var(--text)}
#bg{
  position:fixed;inset:0;z-index:0;
  background-image:url('https://images.unsplash.com/photo-1586023492125-27b2c045efd7?w=1920&q=75');
  background-size:cover;background-position:center;
  transition:opacity .4s;
}
#bg::after{
  content:'';position:absolute;inset:0;
  background:var(--overlay);
}
#app{position:relative;z-index:1;min-height:100vh}

/* ═══ SCROLLBAR ═══ */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--scroll-bg)}
::-webkit-scrollbar-thumb{background:var(--scroll-th);border-radius:3px}

/* ═══ INPUTS ═══ */
input,select,textarea{
  width:100%;background:var(--bg-input);border:1px solid var(--border);
  color:var(--text);border-radius:10px;padding:9px 13px;font-size:14px;
  outline:none;font-family:inherit;transition:border .2s,background .2s;box-sizing:border-box;
}
input:focus,select:focus,textarea:focus{border-color:var(--border-f);background:var(--bg-hover)}
select option{background:var(--bg-page);color:var(--text)}
button{font-family:inherit;cursor:pointer;transition:all .18s;border:none}
button:hover{filter:brightness(1.10)}
button:active{transform:scale(.97)}

/* ═══ CARDS ═══ */
.card{
  background:var(--bg-card);
  backdrop-filter:blur(16px);
  border:1px solid var(--border);
  border-radius:16px;padding:20px;
  transition:background .3s,border .3s;
}
.kpi{background:var(--bg-card2);border:1px solid var(--border);border-radius:14px;padding:14px 18px;transition:background .3s}

/* ═══ BUTTONS ═══ */
.btn{display:inline-flex;align-items:center;gap:5px;padding:9px 18px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;border:none;transition:all .18s}
.btn-dark  {background:linear-gradient(135deg,#1a1a1a,#2c2c2c);color:#e8e8e8;border:1px solid rgba(255,255,255,.12)!important}
.btn-outline{background:var(--bg-hover);color:var(--text);border:1px solid var(--border)!important}
.btn-ghost {background:transparent;color:var(--text-sub)}
.btn-danger{background:rgba(239,68,68,.1);color:#f87171;border:1px solid rgba(239,68,68,.2)!important}
.btn-green {background:linear-gradient(135deg,#15803d,#22c55e);color:#fff}
.btn-gold  {background:linear-gradient(135deg,#78350f,#b45309);color:#fef3c7}
.btn-primary{background:linear-gradient(135deg,#222,#3a3a3a);color:#fff;border:1px solid rgba(255,255,255,.15)!important}

/* ═══ HEADER ═══ */
#hdr{
  position:sticky;top:0;z-index:50;
  background:rgba(6,6,8,0.94);
  backdrop-filter:blur(22px);
  border-bottom:1px solid rgba(255,255,255,0.08);
  transition:background .3s;
}
[data-theme="light"] #hdr{background:rgba(245,245,245,0.94);border-bottom:1px solid rgba(0,0,0,0.1)}
.hdr-inner{max-width:1280px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:62px;padding:0 24px}
.brand-name{
  font-size:21px;font-weight:900;letter-spacing:-0.5px;
  background:linear-gradient(130deg,#d4d4d4 0%,#a0a0a0 50%,#e8e8e8 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.1;
}
.beta-badge{
  display:inline-block;font-size:9px;font-weight:800;letter-spacing:0.8px;
  background:rgba(180,83,9,0.18);color:#c07030;
  border:1px solid rgba(180,83,9,0.32);border-radius:5px;
  padding:1px 6px;vertical-align:middle;margin-left:5px;position:relative;top:-2px;
}
.nav-btn{padding:6px 16px;border-radius:8px;font-size:13px;font-weight:700;background:transparent;color:var(--text-sub);border-bottom:2px solid transparent;transition:all .2s;cursor:pointer}
.nav-btn.active{background:rgba(200,200,200,.1);color:var(--text);border-bottom:2px solid var(--accent)}

/* ═══ MAIN ═══ */
#main{max-width:1280px;margin:0 auto;padding:24px 22px}

/* ═══ LAYOUT ═══ */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.grid-4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:11px}
.sec-title{font-size:11px;font-weight:700;color:var(--accent);margin-bottom:11px;text-transform:uppercase;letter-spacing:.7px}

/* ═══ BADGE ═══ */
.badge{display:inline-flex;align-items:center;padding:3px 11px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}

/* ═══ TOGGLE ═══ */
.toggle-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);cursor:pointer}
.toggle-track{width:32px;height:17px;border-radius:9px;background:rgba(150,150,150,.2);position:relative;transition:all .2s;flex-shrink:0}
.toggle-track.on{background:#555}
.toggle-thumb{position:absolute;top:2px;left:2px;width:13px;height:13px;border-radius:50%;background:#fff;transition:all .2s}
.toggle-track.on .toggle-thumb{left:17px}

/* ═══ MAT TABLE ═══ */
.mat-table{border-radius:10px;overflow:hidden;border:1px solid var(--border);margin-bottom:14px}
.mat-th{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;padding:8px 13px;background:rgba(150,150,150,.06)}
.mat-th span{font-size:10px;font-weight:700;color:var(--text-sub);text-transform:uppercase}
.mat-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;padding:8px 13px;border-top:1px solid var(--border);align-items:center}

/* ═══ BUDGET CARD ═══ */
.bcard{cursor:pointer;border-left:3px solid #555;transition:all .22s}
.bcard:hover{transform:translateY(-3px);box-shadow:var(--shadow)}

/* ═══ CHARTS ═══ */
.cbar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.cbar-label{width:88px;text-align:right;color:var(--text-sub);font-size:11px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cbar-track{flex:1;background:rgba(150,150,150,.08);border-radius:4px;height:20px;overflow:hidden}
.cbar-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:6px;font-size:10px;font-weight:700;color:rgba(255,255,255,.8);transition:width .6s}
.cbar-val{width:80px;color:var(--text-sub);font-size:11px;flex-shrink:0}
.mchart{display:flex;align-items:flex-end;gap:8px;height:140px;padding:0 4px}
.mbar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.mbar-group{display:flex;gap:3px;align-items:flex-end;height:110px}
.mbar{width:18px;border-radius:3px 3px 0 0;transition:height .5s}
.mbar-lbl{font-size:9px;color:var(--text-muted);text-align:center}
.pie-legend{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.pie-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text-sub)}
.pie-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* ═══ MODAL ═══ */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}

/* ═══ THEME SWITCH ═══ */
.theme-btn{width:34px;height:34px;border-radius:50%;border:1px solid var(--border)!important;background:var(--bg-hover);color:var(--text);font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .2s}

/* ═══ LANDING ═══ */
.feat-card{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:22px;transition:transform .2s,box-shadow .2s}
.feat-card:hover{transform:translateY(-3px);box-shadow:var(--shadow)}

/* ═══ ANIM ═══ */
@keyframes fi{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fi .3s ease forwards}

/* ═══ PDF PREVIEW ═══ */
.pdf-prev{border-radius:14px;overflow:hidden;margin-bottom:12px}

/* ═══ SCROLLABLE ═══ */
.scroll-y{overflow-y:auto;max-height:80vh}

@media(max-width:720px){.grid-4{grid-template-columns:1fr 1fr}.grid-3{grid-template-columns:1fr 1fr}.hdr-user-extra{display:none}}
</style>

/* SHA-256 via Web Crypto — passwords never stored in plain text */
async function hashPass(plain){
  const buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(plain));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

async function sbLoadUser(uid){
  try{
    /* timeout de 8 segundos para não travar */
    const timeout=new Promise((_,rej)=>setTimeout(()=>rej(new Error("timeout")),8000));
    const query=supabase.from("users").select("*").eq("id",uid).single();
    const{data:profile,error}=await Promise.race([query,timeout]);
    if(error||!profile){
      /* perfil não existe ainda — tenta criar */
      const{data:{user}}=await supabase.auth.getUser();
      if(user){return await sbCreateUser(uid,user.email.split("@")[0],user.email);}
      return null;
    }
    const{data:budgets}=await supabase.from("budgets").select("*").eq("user_id",uid).order("created_at",{ascending:false});
    const parsed=(budgets||[]).map(b=>({
      ...b,
      id:b.budget_key||b.id,
      extras:           tryParse(b.extras,       []),
      customMaterials:  tryParse(b.custom_materials, null),
      materials:        tryParse(b.materials,    {}),
    }));
    return{
      ...profile,
      pricePresets:      tryParse(profile.price_presets,      DEFAULT_PRESETS),
      operationalCosts:  tryParse(profile.operational_costs,  []),
      companyName:  profile.company_name||"",
      companyLogo:  profile.company_logo||"",
      customBgImg:  profile.custom_bg_img||"",
      totalBudgetsCreated:profile.total_budgets_created||0,
      budgets:parsed,
    };
  }catch(e){
    console.error("sbLoadUser:",e.message);
    return null;
  }
}
/* helper para parsear JSON sem explodir */
function tryParse(val,fallback){
  if(!val)return fallback;
  if(typeof val==="object")return val;
  try{return JSON.parse(val);}catch{return fallback;}
}
async function sbCreateUser(uid,name,email){
  const row={id:uid,name,email,plan:"free",total_budgets_created:0,price_presets:JSON.stringify(DEFAULT_PRESETS),company_name:"",company_logo:"",custom_bg_img:"",operational_costs:"[]"};
  await supabase.from("users").upsert(row);
  return{id:uid,name,email,plan:"free",totalBudgetsCreated:0,pricePresets:JSON.parse(JSON.stringify(DEFAULT_PRESETS)),companyName:"",companyLogo:"",customBgImg:"",operationalCosts:[],budgets:[]};
}

const GCOLS=["#555","#777","#444","#666","#888"];
function buildBarChart(data,valKey,cols,fmtFn){
  const max=Math.max(...data.map(d=>d[valKey]),1);
  const wrap=div(""); wrap.style.padding="8px 0";
  data.forEach((d,i)=>{
    const row=div("cbar-row");
    const l=div("cbar-label",d.name);row.appendChild(l);
    const track=div("cbar-track");
    const fill=div("cbar-fill");fill.style.background=cols[i%cols.length];fill.style.width="0%";
    track.appendChild(fill);row.appendChild(track);
    const v=div("cbar-val",fmtFn?fmtFn(d[valKey]):d[valKey]);
    row.appendChild(v);wrap.appendChild(row);
    setTimeout(()=>{fill.style.width=Math.round((d[valKey]/max)*100)+"%";},80+i*60);
  });
  return wrap;
}
function buildMonthChart(monthly){
  const maxV=Math.max(...monthly.map(m=>Math.max(m.receita||0,m.lucro||0)),1);
  const wrap=div("mchart");
  monthly.forEach(m=>{
    const col=div("mbar-wrap");
    const group=div("mbar-group");
    const b1=div("mbar");b1.style.background="#555";b1.style.width="18px";b1.title=`Receita: ${fmt(m.receita||0)}`;
    const b2=div("mbar");b2.style.background="#888";b2.style.width="18px";b2.title=`Lucro: ${fmt(m.lucro||0)}`;
    b1.style.height="0px";b2.style.height="0px";
    group.appendChild(b1);group.appendChild(b2);
    col.appendChild(group);col.appendChild(div("mbar-lbl",m.name));
    wrap.appendChild(col);
    setTimeout(()=>{
      b1.style.height=Math.max(4,Math.round(((m.receita||0)/maxV)*100))+"px";
      b2.style.height=Math.max(2,Math.round(((m.lucro||0)/maxV)*100))+"px";
    },120);
  });
  return wrap;
}
function buildPieChart(data,sz=130){
  const total=data.reduce((s,d)=>s+d.value,0)||1;
  const ns="http://www.w3.org/2000/svg";
  const svg=document.createElementNS(ns,"svg");
  svg.setAttribute("width",sz);svg.setAttribute("height",sz);svg.setAttribute("viewBox",`0 0 ${sz} ${sz}`);
  const cx=sz/2,cy=sz/2,r=sz*.42;let angle=-Math.PI/2;
  data.forEach(d=>{
    const slice=(d.value/total)*2*Math.PI;
    const x1=cx+r*Math.cos(angle),y1=cy+r*Math.sin(angle);
    angle+=slice;
    const x2=cx+r*Math.cos(angle),y2=cy+r*Math.sin(angle);
    const path=document.createElementNS(ns,"path");
    path.setAttribute("d",`M${cx},${cy} L${x1},${y1} A${r},${r},0,${slice>Math.PI?1:0},1,${x2},${y2} Z`);
    path.setAttribute("fill",d.color);path.setAttribute("opacity","0.82");
    const t=document.createElementNS(ns,"title");t.textContent=`${d.name}: ${d.value}`;path.appendChild(t);
    svg.appendChild(path);
  });
  return svg;
}

  /* Função de login — definida como function declaration para evitar TDZ */
  async function doLogin(){
    errBox.style.display="none";
    const btnEl=document.getElementById("woodary-submit-btn");
    if(btnEl){btnEl.textContent="Aguarde...";btnEl.disabled=true;}
    let success=false;
    try{
      if(SUPA_READY){
        if(mode==="login"){
          const{data,error}=await supabase.auth.signInWithPassword({email:emI.value,password:paI.value});
          if(error){
            const m=error.message.includes("Invalid")||error.message.includes("credentials")?"E-mail ou senha incorretos.":
              error.message.includes("confirm")||error.message.includes("verified")?"E-mail não confirmado. Verifique sua caixa de entrada e clique no link de confirmação.":
              error.message.includes("many")?"Muitas tentativas. Aguarde alguns minutos.":error.message;
            showErr(m);return;
          }
          const userData=await sbLoadUser(data.user.id);
          success=true;emI.value="";paI.value="";
          const profile=userData||await sbCreateUser(data.user.id,data.user.email.split("@")[0],data.user.email);
          setState({cur:{...profile,uid:data.user.id},page:"app"});
        } else {
          if(!nameI.value||!emI.value||!paI.value){showErr("Preencha todos os campos.");return;}
          if(paI.value.length<6){showErr("Senha mínima: 6 caracteres.");return;}
          const{data,error}=await supabase.auth.signUp({email:emI.value,password:paI.value});
          if(error){showErr(error.message.includes("already")?"E-mail já cadastrado.":error.message);return;}
          if(!data.user){showErr("Verifique sua caixa de e-mail e confirme o cadastro.");return;}
          /* Se email confirmation está ativa, user existe mas session é null */
          if(!data.session){
            success=true;emI.value="";paI.value="";
            errBox.style.background="rgba(45,122,79,0.15)";errBox.style.borderColor="rgba(45,122,79,0.4)";errBox.style.color="#34d399";
            errBox.textContent="✅ Conta criada! Verifique seu e-mail para confirmar, depois faça login.";errBox.style.display="block";
            /* switch to login tab */
            mode="login";
            Object.entries(tabBtns).forEach(([kk,bb])=>{bb.style.background=kk==="login"?"rgba(200,200,200,.15)":"transparent";bb.style.color=kk==="login"?"var(--text)":"var(--text-sub)";});
            nameRow.style.display="none";
            return;
          }
          const userData=await sbCreateUser(data.user.id,nameI.value,emI.value);
          success=true;emI.value="";paI.value="";
          setState({cur:{...userData,uid:data.user.id},page:"app"});
        }
      } else {
        const hashed=await hashPass(paI.value);
        if(mode==="login"){
          const u=STATE.localUsers.find(u=>u.email===emI.value&&u.pass===hashed);
          if(!u){showErr("E-mail ou senha incorretos.");return;}
          success=true;
          emI.value="";paI.value="";
          setState({cur:u,page:"app"});
        } else {
          if(!nameI.value||!emI.value||!paI.value){showErr("Preencha todos os campos.");return;}
          if(paI.value.length<6){showErr("Senha mínima: 6 caracteres.");return;}
          if(STATE.localUsers.find(u=>u.email===emI.value)){showErr("E-mail já cadastrado.");return;}
          const nu={id:uid(),name:nameI.value,email:emI.value,pass:hashed,plan:"free",totalBudgetsCreated:0,budgets:[],pricePresets:JSON.parse(JSON.stringify(DEFAULT_PRESETS)),companyName:"",companyLogo:"",customBgImg:"",operationalCosts:[]};
          success=true;
          emI.value="";paI.value="";
          STATE.localUsers.push(nu);setState({cur:nu,page:"app"});
        }
      }
    }catch(e2){
      const m=e2.message==="timeout"?"Conexão lenta. Verifique sua internet e tente novamente.":
        e2.message?.includes("Invalid")||e2.message?.includes("credentials")?"E-mail ou senha incorretos.":
        e2.message||"Erro ao processar. Tente novamente.";
      showErr(m);
    }
    /* só reativa o botão se não houve sucesso (sucesso destrói o DOM) */
    if(!success){
      const b2=document.getElementById("woodary-submit-btn");
      if(b2){b2.textContent=mode==="login"?"Entrar →":"Criar Conta →";b2.disabled=false;}
    }
  }

  paI.addEventListener("keydown",e=>{if(e.key==="Enter")doLogin();});

  const submitBtn=btn("Entrar →","btn-primary",doLogin,{width:"100%",padding:"12px",fontSize:"14px",marginBottom:"16px",borderRadius:"10px",justifyContent:"center",display:"flex",alignItems:"center",justifyContent:"center"});
  submitBtn.id="woodary-submit-btn";
  card.appendChild(submitBtn);

  const demo=div("");demo.style.cssText="padding:12px;background:rgba(150,150,150,.06);border-radius:10px;border:1px solid var(--border)";
  demo.innerHTML=`<div style="font-size:10px;color:var(--text-muted);margin-bottom:7px;font-weight:700;text-transform:uppercase">💡 Novidade</div><div style="font-size:11px;color:var(--text-sub);line-height:1.6">Crie uma conta gratuita para começar.<br><span style="color:var(--text-muted)">Seus dados ficam salvos na nuvem.</span></div>`;
  card.appendChild(demo);
  box.appendChild(card);wrap.appendChild(box);
  return wrap;
}

function genProposal(selBudgets,tmplIn,u){
  const sh=STATE.pdfShow;
  const isCusBg=STATE.pdfTpl==="custom"&&u.customBgImg;
  const tmpl=isCusBg?{img:u.customBgImg,accent:"#d4af70",overlay:"rgba(10,8,4,0.88)"}:(tmplIn||PDF_TPLS[0]);
  const totalGeral=selBudgets.reduce((s,b)=>s+calcB(b).sale,0);
  const cl=selBudgets[0]?.client||"";
  const logoHtml=u.companyLogo?`<img src="${u.companyLogo}" style="height:40px;border-radius:6px;margin-bottom:6px;display:block">`:"";
  const envSections=selBudgets.map(b=>{
    const c=calcB(b);
    const mats=b.customMaterials||[];
    const matRows=sh.materials?mats.filter(m=>m.quantity>0).map(m=>`<div class="row"><span class="rl">${m.name} — ${m.quantity} ${m.unit||""} × ${fmt(m.unitPrice)}</span><span class="rv">${fmt(m.quantity*m.unitPrice)}</span></div>`).join(""):"";
    const exRows=sh.extras?b.extras.map(e=>`<div class="row"><span class="rl">+ ${e.name}</span><span class="rv ex">${fmt(+e.value)}</span></div>`).join(""):"";
    const execRow=c.execCost>0?`<div class="row"><span class="rl">⚙️ Execução</span><span class="rv" style="color:#9c6fe4">${fmt(c.execCost)}</span></div>`:"";
    const costRow=sh.cost?`<div class="row"><span class="rl">Custo Total</span><span class="rv">${fmt(c.cost)}</span></div>`:"";
    const marginRow=sh.margin?`<div class="row"><span class="rl">Margem de Lucro</span><span class="rv">${b.margin}%</span></div>`:"";
    const notesHtml=sh.notes&&b.notes?`<div style="font-size:11px;color:#94a3b8;margin-top:6px;line-height:1.6;font-style:italic">${b.notes}</div>`:"";
    const delivRow=sh.delivery&&b.deliveryDate?`<div class="row"><span class="rl">Previsão de Entrega</span><span class="rv">${fmtd(b.deliveryDate)}</span></div>`:"";
    return `<div class="env-sec"><div class="env-title">🏠 ${b.name}</div>${matRows}${exRows}${execRow}${delivRow}${costRow}${marginRow}${notesHtml}<div class="env-sub"><span>Subtotal do Ambiente</span><span style="color:${tmpl.accent}">${fmt(c.sale)}</span></div></div>`;
  }).join("");
  const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Proposta — ${u.companyName||"Marcenaria"}</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI',sans-serif;min-height:100vh;padding:50px 32px;background:#0a0804;background-image:url('${tmpl.img}');background-size:cover;background-position:center}body::before{content:'';position:fixed;inset:0;background:${tmpl.overlay};z-index:0;pointer-events:none}.w{max-width:740px;margin:0 auto;position:relative;z-index:1;color:#e2e8f0}.hd{display:flex;justify-content:space-between;align-items:flex-start;padding-bottom:18px;border-bottom:1px solid ${tmpl.accent}40;margin-bottom:24px}.company-name{font-size:26px;font-weight:900;color:${tmpl.accent}}.prop-label{font-size:10px;color:rgba(255,255,255,.3);text-align:right;margin-bottom:3px;text-transform:uppercase;letter-spacing:1px}.prop-date{font-size:11px;color:rgba(255,255,255,.25);text-align:right}.client-label{font-size:11px;color:rgba(255,255,255,.4);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}.client-name{font-size:20px;font-weight:800;color:#f1f5f9;margin-bottom:22px}.env-sec{background:rgba(0,0,0,.3);backdrop-filter:blur(4px);border-radius:12px;padding:18px;margin-bottom:14px;border:1px solid ${tmpl.accent}14}.env-title{font-size:14px;font-weight:800;color:${tmpl.accent};margin-bottom:12px}.row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:12px}.rl{color:#94a3b8}.rv{color:${tmpl.accent};font-weight:700}.ex{color:#c8a45e}.env-sub{display:flex;justify-content:space-between;margin-top:10px;padding-top:8px;border-top:1px solid rgba(255,255,255,.1);font-size:13px;font-weight:700;color:rgba(255,255,255,.7)}.tt{background:${tmpl.accent}12;border:1px solid ${tmpl.accent}28;border-radius:14px;padding:24px;text-align:center;margin-top:8px}.tl{font-size:10px;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}.tv{font-size:38px;font-weight:900;color:${tmpl.accent}}.st{border:3px solid rgba(200,200,200,.5);border-radius:50%;width:80px;height:80px;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:22px auto 0;color:rgba(200,200,200,.6);font-size:9px;font-weight:800;text-transform:uppercase;text-align:center;transform:rotate(-12deg)}.ft{text-align:center;margin-top:28px;font-size:10px;color:#334155}</style></head><body><div class="w"><div class="hd"><div>${logoHtml}<div class="company-name">${u.companyName||"Proposta de Serviço"}</div></div><div><div class="prop-label">Proposta de Serviço</div><div class="prop-date">${new Date().toLocaleDateString("pt-BR")}</div></div></div><div class="client-label">Apresentada a</div><div class="client-name">${cl}</div>${envSections}<div class="tt"><div class="tl">Valor Total da Proposta</div><div class="tv">${fmt(totalGeral)}</div></div>${sh.stamp?`<div class="st">✓<br>APROVADO</div>`:""}<div class="ft">Proposta válida por 30 dias · ${u.companyName||""}</div></div></body></html>`;
  const blob=new Blob([html],{type:"text/html"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download=`Proposta_${(u.companyName||"proposta").replace(/[^a-zA-Z0-9]/g,"_")}_${cl.replace(/[^a-zA-Z0-9]/g,"_")}.html`;
  document.body.appendChild(a);a.click();
  setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},1000);
}

    {t:"9. Limitação de Responsabilidade",body:"O Woodary não garante disponibilidade ininterrupta do serviço e não se responsabiliza por perdas decorrentes de falhas técnicas, interrupções ou indisponibilidade temporária da plataforma."},
    {t:"10. Alterações nos Termos",body:"Estes Termos podem ser atualizados periodicamente. Notificaremos os usuários com antecedência mínima de 15 dias antes de mudanças significativas. O uso continuado após a notificação implica aceitação dos novos termos."},
    {t:"11. Legislação Aplicável",body:"Estes Termos são regidos pelas leis da República Federativa do Brasil. Fica eleito o foro da comarca do usuário para dirimir quaisquer disputas decorrentes deste instrumento."},
  ];
  terms.forEach(({t,body})=>{
    const s=div("");s.style.cssText="margin-bottom:18px;padding-bottom:18px;border-bottom:1px solid var(--border)";
    s.innerHTML=`<div style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:6px">${t}</div><div style="font-size:13px;color:var(--text-sub);line-height:1.7">${body}</div>`;
    card.appendChild(s);
  });
  const last=div("");last.style.cssText="font-size:11px;color:var(--text-muted);text-align:center;margin-top:10px";last.textContent=`Última atualização: maio de 2026 · Woodary — Orçamentos inteligentes pra marcenaria`;
  card.appendChild(last);bg.appendChild(card);return bg;
}

/* ════════════════════════════════════════════
   FOOTER
════════════════════════════════════════════ */
function buildFooter(){
  const f=el("footer","");
  f.style.cssText="text-align:center;padding:18px 20px;font-size:12px;color:var(--text-muted);border-top:1px solid var(--border);background:rgba(0,0,0,.3);backdrop-filter:blur(8px)";
  f.innerHTML=`© 2026 Woodary · Orçamentos inteligentes pra marcenaria &nbsp;·&nbsp; `;
  const tb=el("button","");tb.textContent="Termos de Uso";tb.style.cssText="background:none;border:none;color:var(--text-sub);font-size:12px;cursor:pointer;text-decoration:underline;padding:0";
  tb.addEventListener("click",()=>{STATE.showTerms=true;render();});
  f.appendChild(tb);return f;
}
function buildHeader(){
  const hdr=el("header","");hdr.id="hdr";
  const inner=div("hdr-inner");
  const brand=div("");brand.style.cssText="display:flex;align-items:center;gap:10px;cursor:pointer";
  brand.appendChild(buildLogo());
  const bn=div("");bn.innerHTML=`<div><span class="brand-name">Woodary</span><span class="beta-badge">BETA</span></div><div style="font-size:9px;color:var(--text-muted)">Orçamentos inteligentes pra marcenaria</div>`;
  brand.appendChild(bn);inner.appendChild(brand);
  const nav=div("");nav.style.cssText="display:flex;gap:3px";
  [{k:"budgets",l:"📋 Orçamentos"},{k:"gestao",l:"📊 Gestão"},{k:"pdf",l:"📄 Proposta de Serviço"}].forEach(({k,l:ll})=>{const b=el("button","nav-btn"+(STATE.tab===k?" active":""),ll);b.addEventListener("click",()=>setState({tab:k,view:"list"}));nav.appendChild(b);});
  inner.appendChild(nav);
  const u=STATE.cur;
  const ui=div("");ui.style.cssText="display:flex;align-items:center;gap:9px";
  const ut=div("hdr-user-extra");ut.style.cssText="text-align:right";
  ut.innerHTML=`<div style="font-size:12px;font-weight:700;color:var(--text)">${u.name}</div><div style="font-size:10px;color:${u.plan==="pro"?"#b45309":"var(--text-muted)"}">${"Versão Beta"}</div>`;
  ui.appendChild(ut);
  ui.appendChild(btn("⚙️ Preços","btn-outline",()=>setState({showSettings:true}),{padding:"5px 11px",fontSize:"11px",borderRadius:"8px"}));
  ui.appendChild(themeBtn());
  ui.appendChild(btn("Sair","btn-ghost",async()=>{
    if(SUPA_READY)try{await supabase.auth.signOut();}catch(e){}
    setState({cur:null,page:"landing",view:"list",filterStatus:"all",filterQ:""});
  },{padding:"5px 11px",fontSize:"11px",borderRadius:"8px"}));
  inner.appendChild(ui);hdr.appendChild(inner);return hdr;
}

/* ════════════════════════════════════════════
   BUILD APP
════════════════════════════════════════════ */
function buildApp(){
  const wrap=div("");
  if(STATE.showTerms){wrap.appendChild(buildTermsModal());return wrap;}
  if(STATE.showSettings&&STATE.cur){wrap.appendChild(buildSettingsModal());return wrap;}
  if(STATE.page==="landing"){wrap.appendChild(buildLanding());return wrap;}
  if(STATE.page==="login"){wrap.appendChild(buildLogin());return wrap;}
  wrap.appendChild(buildHeader());
  const main=el("main","");main.id="main";
  if(STATE.tab==="budgets")main.appendChild(buildBTab());
  else if(STATE.tab==="gestao")main.appendChild(buildGTab());
  else if(STATE.tab==="pdf")main.appendChild(buildPTab());
  wrap.appendChild(main);
  wrap.appendChild(buildFooter());
  return wrap;
}

/* global helper for landing inline onclick */
window.setState=setState;
window.scrollToFeatures=()=>{const f=document.getElementById("features");if(f)f.scrollIntoView({behavior:"smooth"});};

// apply theme and render
setTheme(STATE.theme);

/* Supabase auth state listener — restores session on page reload */
render(); // show initial UI
if(SUPA_READY){
  supabase.auth.getSession().then(async({data:{session}})=>{
    if(session){
      try{
        const userData=await sbLoadUser(session.user.id);
        if(userData){STATE.cur={...userData,uid:session.user.id};setState({page:"app"});return;}
      }catch(e){console.error("getSession:",e);}
    }
  });
  supabase.auth.onAuthStateChange(async(event,session)=>{
    if(event==="SIGNED_IN"&&session&&!STATE.cur){
      try{
        const userData=await sbLoadUser(session.user.id);
        if(userData){STATE.cur={...userData,uid:session.user.id};setState({page:"app"});}
      }catch(e){console.error("onAuthStateChange:",e);}
    }
    if(event==="SIGNED_OUT"&&STATE.page==="app"){setState({cur:null,page:"landing"});}
  });
}
})(); /* end IIFE */
</script>
</body>
</html>
